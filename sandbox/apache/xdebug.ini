; Le MODE Xdebug est piloté par la variable d'env XDEBUG_MODE (voir compose) :
;   off (défaut, prod)  |  develop,debug (dev)
; → aucun coût quand off ; en dev, Xdebug se connecte à l'IDE sur l'hôte.
; Ces réglages ne s'appliquent que si le mode inclut `debug`.
xdebug.start_with_request = yes
xdebug.client_host = host.docker.internal
xdebug.client_port = 9003
xdebug.discover_client_host = false
xdebug.idekey = VSCODE
