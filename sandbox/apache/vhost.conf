# VirtualHost dynamique : le sous-domaine détermine le dossier servi.
#   foo.docker.localhost -> /var/www/sites/foo/public
# Créer un dossier suffit : aucun reload Apache nécessaire (mod_vhost_alias).
<VirtualHost *:80>
    ServerName sandbox
    UseCanonicalName Off

    # %1 = premier label du Host (le sous-domaine).
    VirtualDocumentRoot /var/www/sites/%1/public

    <Directory /var/www/sites>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Traefik est en amont : journaliser l'IP client réelle.
    LogFormat "%{X-Forwarded-For}i %h %l %u %t \"%r\" %>s %b" proxied
    CustomLog ${APACHE_LOG_DIR}/access.log proxied
    ErrorLog ${APACHE_LOG_DIR}/error.log
</VirtualHost>
