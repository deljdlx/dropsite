# Override PROD de l'edge Traefik — active l'ACME DNS-01 wildcard (via Gandi).
# Le résolveur `letsencrypt` est défini dans traefik.yml ; ici on ne fait que :
#   1) fournir le token secret du provider (lu par lego depuis l'environnement)
#   2) demander le certificat wildcard sur le routeur dashboard
# Lancement sur le serveur :
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
services:
  traefik:
    environment:
      # Credentials du provider Gandi (lus par lego). Secret -> uniquement dans .env.
      GANDIV5_PERSONAL_ACCESS_TOKEN: "${GANDIV5_PERSONAL_ACCESS_TOKEN}"
    labels:
      # Routeur DÉDIÉ à l'acquisition du certificat wildcard (DNS-01).
      # Il ne porte QUE des sous-clés `tls.*` (jamais `tls: true`) : sur un même
      # routeur, la clé `tls` ne peut pas être à la fois une feuille (`=true`) et
      # un nœud (`.certresolver`) — sinon la config TLS devient invalide et l'ACME
      # ne reçoit aucun domaine. Le cert obtenu va dans le store et est servi par
      # SNI à tous les autres routeurs *.${DOMAIN} (qui gardent `tls: true`).
      traefik.http.routers.dropsite-wildcard.rule: "Host(`wildcard.${DOMAIN}`)"
      traefik.http.routers.dropsite-wildcard.entrypoints: "websecure"
      traefik.http.routers.dropsite-wildcard.service: "api@internal"
      traefik.http.routers.dropsite-wildcard.tls.certresolver: "letsencrypt"
      traefik.http.routers.dropsite-wildcard.tls.domains[0].main: "${DOMAIN}"
      traefik.http.routers.dropsite-wildcard.tls.domains[0].sans: "*.${DOMAIN}"
