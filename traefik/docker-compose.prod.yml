# Override PROD de l'edge Traefik — active l'ACME DNS-01 wildcard (via Gandi).
# Le résolveur `letsencrypt` est défini dans traefik.yml ; ici on ne fait que :
#   1) fournir le token secret du provider (lu par lego depuis l'environnement)
#   2) demander le certificat wildcard sur le routeur dashboard
# Lancement sur le serveur :
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
services:
  traefik:
    environment:
      # Credentials du provider Gandi (lus par lego). Secret -> uniquement dans .env.
      GANDIV5_PERSONAL_ACCESS_TOKEN: "${GANDIV5_PERSONAL_ACCESS_TOKEN}"
    labels:
      # Demande le certificat wildcard sur le routeur dashboard. Une fois obtenu,
      # il est servi par SNI à TOUS les sous-domaines *.${DOMAIN} (sites
      # dynamiques compris) — les autres routeurs gardent juste `tls: true`.
      traefik.http.routers.dashboard-secure.tls.certresolver: "letsencrypt"
      traefik.http.routers.dashboard-secure.tls.domains[0].main: "${DOMAIN}"
      traefik.http.routers.dashboard-secure.tls.domains[0].sans: "*.${DOMAIN}"
