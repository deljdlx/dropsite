# TLS dev : certificat wildcard self-signed (généré via certs/generate.sh).
# Utilisé comme certificat par défaut pour tout ce qui n'a pas de resolver ACME.
# En prod, les routers demandent leur cert via `tls.certResolver: letsencrypt`.
tls:
  stores:
    default:
      defaultCertificate:
        certFile: /etc/traefik/certs/local.crt
        keyFile: /etc/traefik/certs/local.key
  certificates:
    - certFile: /etc/traefik/certs/local.crt
      keyFile: /etc/traefik/certs/local.key
