# Configuration statique de Traefik (edge mutualisé).
# Le routage applicatif se fait par labels Docker (provider docker) et par le
# provider file (dossier dynamic/).

global:
  checkNewVersion: false
  sendAnonymousUsage: false

log:
  level: INFO

api:
  dashboard: true

entryPoints:
  web:
    address: ":80"
    # En prod on redirigera systématiquement vers HTTPS. En dev on laisse le
    # HTTP passer pour éviter les avertissements de cert self-signed.
  websecure:
    address: ":443"

providers:
  # Découverte des conteneurs sur le réseau `web`. Rien n'est exposé sans
  # `traefik.enable=true` explicite.
  docker:
    exposedByDefault: false
    network: web
    watch: true
  # Configuration dynamique par fichiers (TLS, middlewares).
  file:
    directory: /etc/traefik/dynamic
    watch: true

# Résolveur ACME `letsencrypt` — DNS-01 wildcard.
# Défini ici (et non par env) car Traefik lit sa config statique depuis une SEULE
# source : dès qu'un fichier est monté, les variables TRAEFIK_* sont ignorées.
# Seul le token du provider reste secret et passe par l'environnement (lu
# directement par lego), cf. GANDIV5_PERSONAL_ACCESS_TOKEN dans .env.
# Inerte en dev : aucun routeur local ne référence ce résolveur.
# caServer = PRODUCTION Let's Encrypt. Pour tester sans consommer les quotas,
# décommenter la ligne staging (et vider acme/acme.json avant de rebasculer) :
#   staging -> https://acme-staging-v02.api.letsencrypt.org/directory
certificatesResolvers:
  letsencrypt:
    acme:
      email: "deljdlx@gmail.com"
      storage: /etc/traefik/acme/acme.json
      caServer: "https://acme-v02.api.letsencrypt.org/directory"
      dnsChallenge:
        provider: gandiv5
        resolvers:
          - "1.1.1.1:53"
          - "8.8.8.8:53"
