# Configuration statique de Traefik (edge mutualisé).
# Le routage applicatif se fait par labels Docker (provider docker) et par le
# provider file (dossier dynamic/).

global:
  checkNewVersion: false
  sendAnonymousUsage: false

log:
  level: INFO

api:
  dashboard: true

entryPoints:
  web:
    address: ":80"
    # En prod on redirigera systématiquement vers HTTPS. En dev on laisse le
    # HTTP passer pour éviter les avertissements de cert self-signed.
  websecure:
    address: ":443"

providers:
  # Découverte des conteneurs sur le réseau `web`. Rien n'est exposé sans
  # `traefik.enable=true` explicite.
  docker:
    exposedByDefault: false
    network: web
    watch: true
  # Configuration dynamique par fichiers (TLS, middlewares).
  file:
    directory: /etc/traefik/dynamic
    watch: true

# Le résolveur ACME `letsencrypt` (DNS-01 wildcard) N'EST PAS défini ici :
# le fichier statique n'expanse pas les ${...}. Il est configuré par variables
# d'environnement dans docker-compose.prod.yml (là où compose substitue), ce qui
# évite de figer des valeurs prod dans ce fichier partagé avec le dev.
